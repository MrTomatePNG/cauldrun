<svg viewBox="0 0 900 600" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Shadows -->
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="3" />
      <feOffset dx="2" dy="2" result="offsetblur" />
      <feComponentTransfer>
        <feFuncA type="linear" slope="0.2" />
      </feComponentTransfer>
      <feMerge>
        <feMergeNode />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>

    <!-- Gradients -->
    <linearGradient id="grad-svelte" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ff3e00;stop-opacity:0.2" />
      <stop offset="100%" style="stop-color:#ff3e00;stop-opacity:0.05" />
    </linearGradient>
    <linearGradient id="grad-db" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#336791;stop-opacity:0.2" />
      <stop offset="100%" style="stop-color:#336791;stop-opacity:0.05" />
    </linearGradient>
    <linearGradient id="grad-infra" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#10b981;stop-opacity:0.2" />
      <stop offset="100%" style="stop-color:#10b981;stop-opacity:0.05" />
    </linearGradient>

    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#94a3b8" />
    </marker>
  </defs>

  <!-- Background -->
  <rect width="100%" height="100%" fill="#f8fafc" />

  <!-- Header Section -->
  <text x="450" y="50" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="24" font-weight="800" fill="#1e293b">BUERO ECOSYSTEM</text>
  <text x="450" y="75" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="14" fill="#64748b">High-Level System Architecture &amp; Data Flow</text>

  <!-- 1. Client Side -->
  <g filter="url(#shadow)">
    <rect x="50" y="220" width="160" height="100" rx="12" fill="#ffffff" stroke="#e2e8f0" stroke-width="1.5" />
    <rect x="50" y="220" width="160" height="30" rx="12" fill="#f1f5f9" clip-path="inset(0 0 70 0)" />
    <circle cx="65" cy="235" r="3" fill="#ef4444" />
    <circle cx="75" cy="235" r="3" fill="#fbbf24" />
    <circle cx="85" cy="235" r="3" fill="#10b981" />
    <text x="130" y="280" text-anchor="middle" font-family="Inter, sans-serif" font-size="16" font-weight="700" fill="#0f172a">Browser</text>
    <text x="130" y="298" text-anchor="middle" font-family="Inter, sans-serif" font-size="11" fill="#64748b">Svelte 5 Runes</text>
  </g>

  <!-- 2. SvelteKit Main Core -->
  <g filter="url(#shadow)">
    <rect x="280" y="120" width="300" height="340" rx="16" fill="url(#grad-svelte)" stroke="#ff3e00" stroke-width="2" stroke-dasharray="4,4" />
    <text x="430" y="150" text-anchor="middle" font-family="Inter, sans-serif" font-size="18" font-weight="800" fill="#ff3e00">SvelteKit Server</text>

    <!-- Better Auth Card -->
    <rect x="305" y="175" width="250" height="70" rx="8" fill="#ffffff" stroke="#3b82f6" stroke-width="1.5" />
    <text x="320" y="200" font-family="Inter, sans-serif" font-size="14" font-weight="700" fill="#1e40af">Better Auth v1.1</text>
    <text x="320" y="220" font-family="Inter, sans-serif" font-size="11" fill="#3b82f6">Identity &amp; Session Management</text>

    <!-- Prisma Card -->
    <rect x="305" y="260" width="250" height="70" rx="8" fill="#ffffff" stroke="#059669" stroke-width="1.5" />
    <text x="320" y="285" font-family="Inter, sans-serif" font-size="14" font-weight="700" fill="#065f46">Prisma v7.4 (ORM)</text>
    <text x="320" y="305" font-family="Inter, sans-serif" font-size="11" fill="#10b981">Type-safe DB Abstraction</text>

    <!-- BullMQ Card -->
    <rect x="305" y="345" width="250" height="70" rx="8" fill="#ffffff" stroke="#8b5cf6" stroke-width="1.5" />
    <text x="320" y="370" font-family="Inter, sans-serif" font-size="14" font-weight="700" fill="#5b21b6">BullMQ Queues</text>
    <text x="320" y="390" font-family="Inter, sans-serif" font-size="11" fill="#8b5cf6">Async Task Orchestration</text>
  </g>

  <!-- 3. Infrastructure Row -->
  <g filter="url(#shadow)">
    <!-- PostgreSQL -->
    <rect x="650" y="100" width="180" height="80" rx="10" fill="url(#grad-db)" stroke="#336791" stroke-width="1.5" />
    <text x="740" y="135" text-anchor="middle" font-family="Inter, sans-serif" font-size="15" font-weight="700" fill="#1e3a8a">PostgreSQL</text>
    <text x="740" y="155" text-anchor="middle" font-family="Inter, sans-serif" font-size="11" fill="#475569">Relational Data Store</text>

    <!-- Redis -->
    <rect x="650" y="210" width="180" height="80" rx="10" fill="#fee2e2" stroke="#dc2626" stroke-width="1.5" />
    <text x="740" y="245" text-anchor="middle" font-family="Inter, sans-serif" font-size="15" font-weight="700" fill="#991b1b">Redis</text>
    <text x="740" y="265" text-anchor="middle" font-family="Inter, sans-serif" font-size="11" fill="#b91c1c">Queue State &amp; Cache</text>

    <!-- MinIO -->
    <rect x="650" y="320" width="180" height="80" rx="10" fill="#fef3c7" stroke="#d97706" stroke-width="1.5" />
    <text x="740" y="355" text-anchor="middle" font-family="Inter, sans-serif" font-size="15" font-weight="700" fill="#92400e">MinIO / S3</text>
    <text x="740" y="375" text-anchor="middle" font-family="Inter, sans-serif" font-size="11" fill="#b45309">Object Storage</text>

    <!-- Workers -->
    <rect x="650" y="430" width="180" height="80" rx="10" fill="#f0fdf4" stroke="#16a34a" stroke-width="1.5" />
    <text x="740" y="465" text-anchor="middle" font-family="Inter, sans-serif" font-size="15" font-weight="700" fill="#166534">Media Workers</text>
    <text x="740" y="485" text-anchor="middle" font-family="Inter, sans-serif" font-size="11" fill="#15803d">FFmpeg / Sharp Engine</text>
  </g>

  <!-- Connections -->
  <path d="M 210 270 Q 245 270 280 270" fill="none" stroke="#94a3b8" stroke-width="2" marker-end="url(#arrowhead)" />

  <path d="M 580 295 L 650 140" fill="none" stroke="#94a3b8" stroke-width="1.5" stroke-dasharray="4,2" />
  <path d="M 555 380 L 650 250" fill="none" stroke="#94a3b8" stroke-width="1.5" stroke-dasharray="4,2" />
  <path d="M 580 295 L 650 360" fill="none" stroke="#94a3b8" stroke-width="1.5" stroke-dasharray="4,2" />
  <path d="M 740 290 L 740 430" fill="none" stroke="#16a34a" stroke-width="2" marker-end="url(#arrowhead)" />

</svg>
