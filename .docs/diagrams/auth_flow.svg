<svg viewBox="0 0 900 600" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="2" />
      <feOffset dx="1" dy="1" />
      <feComponentTransfer><feFuncA type="linear" slope="0.1" /></feComponentTransfer>
      <feMerge><feMergeNode /><feMergeNode in="SourceGraphic" /></feMerge>
    </filter>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#3b82f6" />
    </marker>
  </defs>

  <rect width="100%" height="100%" fill="#f8fafc" />
  <text x="450" y="40" text-anchor="middle" font-family="Inter, sans-serif" font-size="22" font-weight="800" fill="#1e293b">AUTHENTICATION LIFECYCLE</text>

  <!-- Headers -->
  <g transform="translate(100, 80)" filter="url(#shadow)">
    <rect width="160" height="40" rx="8" fill="#ffffff" stroke="#e2e8f0" />
    <text x="80" y="25" text-anchor="middle" font-family="Inter, sans-serif" font-size="14" font-weight="700" fill="#334155">Client (Svelte)</text>
    <line x1="80" y1="40" x2="80" y2="480" stroke="#cbd5e1" stroke-dasharray="4,4" />
  </g>

  <g transform="translate(370, 80)" filter="url(#shadow)">
    <rect width="160" height="40" rx="8" fill="#eff6ff" stroke="#3b82f6" />
    <text x="80" y="25" text-anchor="middle" font-family="Inter, sans-serif" font-size="14" font-weight="700" fill="#1e40af">SvelteKit Server</text>
    <line x1="80" y1="40" x2="80" y2="480" stroke="#3b82f6" stroke-dasharray="4,4" stroke-opacity="0.3" />
  </g>

  <g transform="translate(640, 80)" filter="url(#shadow)">
    <rect width="160" height="40" rx="8" fill="#ecfdf5" stroke="#10b981" />
    <text x="80" y="25" text-anchor="middle" font-family="Inter, sans-serif" font-size="14" font-weight="700" fill="#065f46">PostgreSQL</text>
    <line x1="80" y1="40" x2="80" y2="480" stroke="#10b981" stroke-dasharray="4,4" stroke-opacity="0.3" />
  </g>

  <!-- Step 1 -->
  <path d="M 180 160 L 440 160" fill="none" stroke="#3b82f6" stroke-width="2" marker-end="url(#arrow)" />
  <text x="310" y="150" text-anchor="middle" font-family="Inter, sans-serif" font-size="12" font-weight="600" fill="#3b82f6">1. sign-in (credentials)</text>

  <!-- Step 2 -->
  <path d="M 460 190 L 710 190" fill="none" stroke="#64748b" stroke-width="1.5" marker-end="url(#arrow)" />
  <text x="585" y="180" text-anchor="middle" font-family="Inter, sans-serif" font-size="11" fill="#64748b">2. verifyUser()</text>

  <!-- Step 3 -->
  <path d="M 720 220 L 460 220" fill="none" stroke="#64748b" stroke-width="1.5" marker-end="url(#arrow)" />
  <text x="585" y="210" text-anchor="middle" font-family="Inter, sans-serif" font-size="11" fill="#64748b">3. return userData</text>

  <!-- Step 4 -->
  <path d="M 440 250 L 180 250" fill="none" stroke="#10b981" stroke-width="2" marker-end="url(#arrow)" />
  <text x="310" y="240" text-anchor="middle" font-family="Inter, sans-serif" font-size="12" font-weight="600" fill="#059669">4. Set-Cookie (Session)</text>

  <!-- Divider -->
  <rect x="150" y="300" width="600" height="30" rx="15" fill="#f1f5f9" />
  <text x="450" y="320" text-anchor="middle" font-family="Inter, sans-serif" font-size="12" font-weight="700" fill="#64748b">SUBSEQUENT REQUESTS</text>

  <!-- Step 5 -->
  <path d="M 180 370 L 440 370" fill="none" stroke="#3b82f6" stroke-width="2" marker-end="url(#arrow)" />
  <text x="310" y="360" text-anchor="middle" font-family="Inter, sans-serif" font-size="12" font-weight="600" fill="#3b82f6">5. fetch /api/data (with Cookie)</text>

  <!-- Hook Block -->
  <rect x="390" y="390" width="120" height="40" rx="6" fill="#fef3c7" stroke="#f59e0b" filter="url(#shadow)" />
  <text x="450" y="415" text-anchor="middle" font-family="Inter, sans-serif" font-size="11" font-weight="700" fill="#92400e">hooks.server.ts</text>

  <!-- Step 6 -->
  <path d="M 460 440 L 710 440" fill="none" stroke="#64748b" stroke-width="1.5" marker-end="url(#arrow)" />
  <text x="585" y="430" text-anchor="middle" font-family="Inter, sans-serif" font-size="11" fill="#64748b">6. auth.getSession()</text>

  <!-- Step 7 -->
  <path d="M 440 480 L 180 480" fill="none" stroke="#10b981" stroke-width="2" marker-end="url(#arrow)" />
  <text x="310" y="470" text-anchor="middle" font-family="Inter, sans-serif" font-size="12" font-weight="600" fill="#059669">7. event.locals populated</text>

</svg>
