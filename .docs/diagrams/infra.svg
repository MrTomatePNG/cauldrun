<svg viewBox="0 0 900 650" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="3" />
      <feOffset dx="2" dy="2" />
      <feComponentTransfer><feFuncA type="linear" slope="0.1" /></feComponentTransfer>
      <feMerge><feMergeNode /><feMergeNode in="SourceGraphic" /></feMerge>
    </filter>
    <linearGradient id="grad-obs" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#f97316;stop-opacity:0.05" />
      <stop offset="100%" style="stop-color:#f97316;stop-opacity:0.01" />
    </linearGradient>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#64748b" />
    </marker>
  </defs>

  <rect width="100%" height="100%" fill="#f8fafc" />
  <text x="450" y="40" text-anchor="middle" font-family="Inter, sans-serif" font-size="22" font-weight="800" fill="#1e293b">INFRASTRUCTURE &amp; OBSERVABILITY</text>

  <!-- External Flow -->
  <g transform="translate(50, 120)" filter="url(#shadow)">
    <rect width="100" height="60" rx="10" fill="#ffffff" stroke="#10b981" stroke-width="2" />
    <text x="50" y="30" text-anchor="middle" font-family="Inter, sans-serif" font-size="13" font-weight="700" fill="#065f46">Caddy</text>
    <text x="50" y="45" text-anchor="middle" font-family="Inter, sans-serif" font-size="9" fill="#059669">Reverse Proxy</text>
  </g>

  <path d="M 150 150 L 210 150" fill="none" stroke="#64748b" stroke-width="2" marker-end="url(#arrow)" />

  <g transform="translate(220, 120)" filter="url(#shadow)">
    <rect width="100" height="60" rx="10" fill="#ffffff" stroke="#3b82f6" stroke-width="2" />
    <text x="50" y="30" text-anchor="middle" font-family="Inter, sans-serif" font-size="13" font-weight="700" fill="#1e40af">Varnish</text>
    <text x="50" y="45" text-anchor="middle" font-family="Inter, sans-serif" font-size="9" fill="#3b82f6">HTTP Cache</text>
  </g>

  <path d="M 320 150 L 380 150" fill="none" stroke="#64748b" stroke-width="2" marker-end="url(#arrow)" />

  <g transform="translate(390, 120)" filter="url(#shadow)">
    <rect width="130" height="60" rx="10" fill="#ffffff" stroke="#ff3e00" stroke-width="2" />
    <text x="65" y="30" text-anchor="middle" font-family="Inter, sans-serif" font-size="13" font-weight="700" fill="#9a3412">SvelteKit</text>
    <text x="65" y="45" text-anchor="middle" font-family="Inter, sans-serif" font-size="9" fill="#c2410c">App Server</text>
  </g>

  <!-- Observability Section -->
  <rect x="50" y="280" width="800" height="320" rx="20" fill="url(#grad-obs)" stroke="#f97316" stroke-width="1" stroke-dasharray="8,4" />
  <text x="450" y="315" text-anchor="middle" font-family="Inter, sans-serif" font-size="16" font-weight="800" fill="#ea580c">OBSERVABILITY STACK (LGTM)</text>

  <!-- Collector Row -->
  <g transform="translate(100, 360)" filter="url(#shadow)">
    <rect width="140" height="80" rx="10" fill="#ffffff" stroke="#f97316" />
    <text x="70" y="40" text-anchor="middle" font-family="Inter, sans-serif" font-size="14" font-weight="700" fill="#ea580c">Promtail</text>
    <text x="70" y="60" text-anchor="middle" font-family="Inter, sans-serif" font-size="10" fill="#9a3412">Log Scraper</text>
  </g>

  <g transform="translate(300, 360)" filter="url(#shadow)">
    <rect width="140" height="80" rx="10" fill="#ffffff" stroke="#f97316" />
    <text x="70" y="40" text-anchor="middle" font-family="Inter, sans-serif" font-size="14" font-weight="700" fill="#ea580c">Loki</text>
    <text x="70" y="60" text-anchor="middle" font-family="Inter, sans-serif" font-size="10" fill="#9a3412">Log Aggregator</text>
  </g>

  <g transform="translate(500, 360)" filter="url(#shadow)">
    <rect width="140" height="80" rx="10" fill="#ffffff" stroke="#f97316" />
    <text x="70" y="40" text-anchor="middle" font-family="Inter, sans-serif" font-size="14" font-weight="700" fill="#ea580c">Prometheus</text>
    <text x="70" y="60" text-anchor="middle" font-family="Inter, sans-serif" font-size="10" fill="#9a3412">Time Series DB</text>
  </g>

  <!-- Dashboard -->
  <g transform="translate(300, 490)" filter="url(#shadow)">
    <rect width="340" height="80" rx="12" fill="#4f46e5" stroke="#3730a3" stroke-width="3" />
    <text x="170" y="45" text-anchor="middle" font-family="Inter, sans-serif" font-size="18" font-weight="800" fill="#ffffff">Grafana Dashboards</text>
    <text x="170" y="65" text-anchor="middle" font-family="Inter, sans-serif" font-size="11" fill="#c7d2fe">Metrics &amp; Log Correlation</text>
  </g>

  <!-- Connections -->
  <path d="M 100 180 L 100 360" fill="none" stroke="#94a3b8" stroke-width="1" stroke-dasharray="4,2" marker-end="url(#arrow)" />
  <path d="M 450 180 L 450 360" fill="none" stroke="#94a3b8" stroke-width="1" stroke-dasharray="4,2" marker-end="url(#arrow)" />

  <path d="M 240 400 L 300 400" fill="none" stroke="#64748b" stroke-width="1.5" marker-end="url(#arrow)" />
  <path d="M 370 440 L 370 490" fill="none" stroke="#64748b" stroke-width="1.5" marker-end="url(#arrow)" />
  <path d="M 570 440 L 570 490" fill="none" stroke="#64748b" stroke-width="1.5" marker-end="url(#arrow)" />

</svg>
