<svg viewBox="0 0 900 600" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="3" />
      <feOffset dx="2" dy="2" />
      <feComponentTransfer><feFuncA type="linear" slope="0.1" /></feComponentTransfer>
      <feMerge><feMergeNode /><feMergeNode in="SourceGraphic" /></feMerge>
    </filter>
    <linearGradient id="grad-red" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e11d48;stop-opacity:0.1" />
      <stop offset="100%" style="stop-color:#e11d48;stop-opacity:0.02" />
    </linearGradient>
    <marker id="arrow-blue" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#3b82f6" />
    </marker>
    <marker id="arrow-red" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#e11d48" />
    </marker>
  </defs>

  <rect width="100%" height="100%" fill="#f8fafc" />
  <text x="450" y="40" text-anchor="middle" font-family="Inter, sans-serif" font-size="22" font-weight="800" fill="#1e293b">MEDIA PROCESSING PIPELINE</text>

  <!-- Flow 1: Client to SK -->
  <g transform="translate(50, 250)" filter="url(#shadow)">
    <rect width="120" height="80" rx="12" fill="#ffffff" stroke="#e2e8f0" />
    <text x="60" y="45" text-anchor="middle" font-family="Inter, sans-serif" font-size="14" font-weight="700" fill="#334155">User Device</text>
    <text x="60" y="62" text-anchor="middle" font-family="Inter, sans-serif" font-size="10" fill="#94a3b8">File Upload</text>
  </g>

  <path d="M 170 290 L 250 290" fill="none" stroke="#3b82f6" stroke-width="2.5" marker-end="url(#arrow-blue)" />
  <text x="210" y="280" text-anchor="middle" font-family="Inter, sans-serif" font-size="11" font-weight="700" fill="#3b82f6">POST</text>

  <!-- Flow 2: SvelteKit -->
  <g transform="translate(260, 180)" filter="url(#shadow)">
    <rect width="180" height="220" rx="16" fill="url(#grad-red)" stroke="#ff3e00" stroke-width="2" />
    <text x="90" y="30" text-anchor="middle" font-family="Inter, sans-serif" font-size="15" font-weight="800" fill="#ff3e00">SvelteKit API</text>
    <rect x="20" y="50" width="140" height="40" rx="6" fill="#ffffff" stroke="#ff3e00" stroke-opacity="0.3" />
    <text x="90" y="75" text-anchor="middle" font-family="Inter, sans-serif" font-size="11" font-weight="600" fill="#c2410c">1. Generate UUID</text>
    <rect x="20" y="100" width="140" height="40" rx="6" fill="#ffffff" stroke="#ff3e00" stroke-opacity="0.3" />
    <text x="90" y="125" text-anchor="middle" font-family="Inter, sans-serif" font-size="11" font-weight="600" fill="#c2410c">2. Push to S3</text>
    <rect x="20" y="150" width="140" height="40" rx="6" fill="#ffffff" stroke="#ff3e00" stroke-opacity="0.3" />
    <text x="90" y="175" text-anchor="middle" font-family="Inter, sans-serif" font-size="11" font-weight="600" fill="#c2410c">3. BullMQ Job</text>
  </g>

  <!-- Flow 3: S3 -->
  <g transform="translate(500, 80)" filter="url(#shadow)">
    <rect width="180" height="80" rx="10" fill="#fef3c7" stroke="#d97706" />
    <text x="90" y="45" text-anchor="middle" font-family="Inter, sans-serif" font-size="15" font-weight="700" fill="#92400e">MinIO / S3</text>
    <text x="90" y="65" text-anchor="middle" font-family="Inter, sans-serif" font-size="11" fill="#b45309">Original &amp; Processed</text>
  </g>
  <path d="M 440 230 Q 500 230 500 165" fill="none" stroke="#94a3b8" stroke-width="1.5" stroke-dasharray="4,4" marker-end="url(#arrow-blue)" />

  <!-- Flow 4: Redis Queue -->
  <g transform="translate(500, 250)" filter="url(#shadow)">
    <rect width="180" height="80" rx="10" fill="#fee2e2" stroke="#dc2626" />
    <text x="90" y="45" text-anchor="middle" font-family="Inter, sans-serif" font-size="15" font-weight="700" fill="#991b1b">BullMQ (Redis)</text>
    <text x="90" y="65" text-anchor="middle" font-family="Inter, sans-serif" font-size="11" fill="#b91c1c">Pending Tasks</text>
  </g>
  <path d="M 440 330 L 500 330" fill="none" stroke="#dc2626" stroke-width="2" marker-end="url(#arrow-red)" />

  <!-- Flow 5: Worker -->
  <g transform="translate(500, 420)" filter="url(#shadow)">
    <rect width="180" height="100" rx="12" fill="#f0fdf4" stroke="#16a34a" stroke-width="2" />
    <text x="90" y="40" text-anchor="middle" font-family="Inter, sans-serif" font-size="15" font-weight="800" fill="#166534">Media Worker</text>
    <path d="M 40 60 L 140 60" fill="none" stroke="#16a34a" stroke-opacity="0.3" />
    <text x="90" y="80" text-anchor="middle" font-family="Inter, sans-serif" font-size="11" font-weight="600" fill="#15803d">FFmpeg + Sharp</text>
  </g>
  <path d="M 590 330 L 590 420" fill="none" stroke="#16a34a" stroke-width="2" marker-end="url(#arrow-blue)" />
  <text x="600" y="380" font-family="Inter, sans-serif" font-size="10" fill="#15803d">Worker consumes job</text>

  <!-- Return Flow -->
  <path d="M 680 470 C 780 470 780 120 680 120" fill="none" stroke="#10b981" stroke-width="2" stroke-dasharray="5,3" marker-end="url(#arrow-blue)" />
  <text x="790" y="300" text-anchor="middle" transform="rotate(-90 790,300)" font-family="Inter, sans-serif" font-size="11" font-weight="700" fill="#059669">STORE OPTIMIZED MEDIA</text>

</svg>
