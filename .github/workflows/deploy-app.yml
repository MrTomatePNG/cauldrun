name: Deploy App
on:
  workflow_dispatch:

jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout Code
        uses: actions/checkout@v6

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and Push App Image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: Dockerfile
          push: true
          tags: ghcr.io/${{ vars.REPO }}/app:latest

      - name: Transfer Docker Compose
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.PROD_HOST }}
          username: ${{ secrets.PROD_USERNAME }}
          key: ${{ secrets.DEPLOY_KEY }}
          source: "docker-compose.yml"
          target: "/opt/buero"

      - name: Deploy App
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.PROD_HOST }}
          username: ${{ secrets.PROD_USERNAME }}
          key: ${{ secrets.DEPLOY_KEY }}
          script: |
            cd /opt/buero
            echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

            export GITHUB_REPOSITORY="${{ github.repository }}"

            # Usar segredos diretos para evitar composição visível no YAML
            export DATABASE_URL="${{ secrets.PROD_DATABASE_URL }}"
            export REDIS_URL="${{ secrets.PROD_REDIS_URL }}"
            export REDIS_PASSWD="${{ secrets.PROD_REDIS_PASSWD }}"
            export BETTER_AUTH_SECRET="${{ secrets.PROD_BETTER_AUTH_SECRET }}"
            export BETTER_AUTH_BASE_URL="${{ secrets.PROD_BETTER_AUTH_BASE_URL }}"
            export S3_ACCESS_KEY="${{ secrets.PROD_S3_ACCESS_KEY }}"
            export S3_SECRET_KEY="${{ secrets.PROD_S3_SECRET_KEY }}"
            export S3_BUCKET_NAME="${{ secrets.PROD_S3_BUCKET_NAME }}"
            export S3_CDN_URL="${{ secrets.PROD_S3_CDN_URL }}"
            export PROD_RESEND_API_KEY="${{ secrets.PROD_RESEND_API_KEY }}"
            export ORIGIN="${{ secrets.PROD_ORIGIN }}"

            docker compose pull app
            docker compose up -d db redis minio varnish

            echo "Rodando migrations..."
            docker run --rm \
              --network buero_buero-network \
              --env DATABASE_URL="$DATABASE_URL" \
              ghcr.io/${{ github.repository }}/app:latest \
              bun prisma migrate deploy

            docker compose up -d app
            docker image prune -f
