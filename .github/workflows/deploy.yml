name: Deploy to Production VPS
on:
  push:
    branches:
      - master
  workflow_dispatch:

jobs:
  deploy:
    name: Deploy and Restart Application
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: 1/5 - Pull latest code & execute permissions
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.PROD_HOST }}
          username: ${{ secrets.PROD_USERNAME }}
          key: ${{ secrets.DEPLOY_KEY }}
          script: |
            set -e
            cd /opt/cauldrun
            git fetch origin master
            git reset --hard origin/master
            chmod +x scripts/*.sh

      - name: 2/5 - Install dependencies
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.PROD_HOST }}
          username: ${{ secrets.PROD_USERNAME }}
          key: ${{ secrets.DEPLOY_KEY }}
          script: |
            set -e
            export PATH="/home/cauldrun/.bun/bin:$PATH"
            cd /opt/cauldrun
            bash scripts/2_install.sh

      - name: 3/5 - Run database migrations
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.PROD_HOST }}
          username: ${{ secrets.PROD_USERNAME }}
          key: ${{ secrets.DEPLOY_KEY }}
          script: |
            set -e
            export PATH="/home/cauldrun/.bun/bin:$PATH"
            export DATABASE_URL="${{ secrets.PROD_DATABASE_URL }}"
            cd /opt/cauldrun
            bash scripts/3_migrate.sh

      - name: 4/5 - Build application
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.PROD_HOST }}
          username: ${{ secrets.PROD_USERNAME }}
          key: ${{ secrets.DEPLOY_KEY }}
          script: |
            set -e
            export PATH="/home/cauldrun/.bun/bin:$PATH"
            export DATABASE_URL="${{ secrets.PROD_DATABASE_URL }}"
            cd /opt/cauldrun
            bash scripts/4_build.sh

      - name: 5/5 - Restart application server
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.PROD_HOST }}
          username: ${{ secrets.PROD_USERNAME }}
          key: ${{ secrets.DEPLOY_KEY }}
          script: |
            set -e
            cd /opt/cauldrun
            bash scripts/5_restart.sh
