name: Deploy to Production

on:
  push:
    branches: [master, main]

jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Setup Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest

      - name: Install Dependencies
        run: bun install --frozen-lockfile

      - name: Generate Prisma Client
        run: bun prisma generate
        env:
          DATABASE_URL: ${{ secrets.PROD_DATABASE_URL }}

      - name: Build Application
        run: bun run build
        env:
          DATABASE_URL: ${{ secrets.PROD_DATABASE_URL }}
          BETTER_AUTH_SECRET: ${{ secrets.PROD_BETTER_AUTH_SECRET }}
          BETTER_AUTH_BASE_URL: ${{ secrets.PROD_BETTER_AUTH_BASE_URL }}
          S3_ENDPOINT: ${{ secrets.PROD_S3_ENDPOINT }}
          S3_REGION: ${{ secrets.PROD_S3_REGION }}
          S3_ACCESS_KEY: ${{ secrets.PROD_S3_ACCESS_KEY }}
          S3_SECRET_KEY: ${{ secrets.PROD_S3_SECRET_KEY }}
          S3_BUCKET_NAME: ${{ secrets.PROD_S3_BUCKET_NAME }}
          RESEND_API_KEY: ${{ secrets.PROD_RESEND_API_KEY }}

      - name: Transfer Files to VPS
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.PROD_HOST }}
          username: ${{ secrets.PROD_USERNAME }}
          key: ${{ secrets.DEPLOY_KEY }}
          source: "build,package.json,bun.lock,prisma"
          target: "/opt/sewer-comedy"

      - name: Finalize Deploy on VPS
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.PROD_HOST }}
          username: ${{ secrets.PROD_USERNAME }}
          key: ${{ secrets.DEPLOY_KEY }}
          script: |
            cd /opt/sewer-comedy
            export PATH="$HOME/.bun/bin:$PATH"
            
            # Instala apenas dependências de produção
            bun install --production

            # Executa Migrations
            export DATABASE_URL="${{ secrets.PROD_DATABASE_URL }}"
            bun prisma migrate deploy

            # Reinicia o App com PM2 injetando todas as variáveis de ambiente necessárias
            PORT=3000 pm2 restart sewer-app --update-env || \
            PORT=3000 \
            BETTER_AUTH_SECRET="${{ secrets.PROD_BETTER_AUTH_SECRET }}" \
            BETTER_AUTH_BASE_URL="${{ secrets.PROD_BETTER_AUTH_BASE_URL }}" \
            DATABASE_URL="${{ secrets.PROD_DATABASE_URL }}" \
            S3_ENDPOINT="${{ secrets.PROD_S3_ENDPOINT }}" \
            S3_REGION="${{ secrets.PROD_S3_REGION }}" \
            S3_ACCESS_KEY="${{ secrets.PROD_S3_ACCESS_KEY }}" \
            S3_SECRET_KEY="${{ secrets.PROD_S3_SECRET_KEY }}" \
            S3_BUCKET_NAME="${{ secrets.PROD_S3_BUCKET_NAME }}" \
            RESEND_API_KEY="${{ secrets.PROD_RESEND_API_KEY }}" \
            pm2 start build/index.js --name sewer-app
            
            pm2 save
