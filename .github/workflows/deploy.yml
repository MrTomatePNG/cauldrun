name: Deploy to VPS

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Setup Bun
        uses: oven-sh/setup-bun@v1

      - name: Install and Build
        run: |
          bun install
          bun --bun run build

      - name: Deploy to VPS
        uses: appleboy/ssh-action@master
        with:
          host: 154.29.76.170
          username: cauldrun
          key: ${{ secrets.DEPLOY_KEY }}
          script: |
            cd /opt/cauldrun
            git pull origin main
            bun install
            bun --bun run build
            pm2 restart sveltekit-app
            pm2 save
