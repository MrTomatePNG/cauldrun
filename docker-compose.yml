services:
  # --- INFRA BASE ---
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    profiles: ["dev", "prod"]
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 5s
      timeout: 5s
      retries: 5
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - buero-network

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    profiles: ["dev", "prod"]
    command: redis-server --requirepass ${REDIS_PASSWD}
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWD}", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    volumes:
      - redis_data:/data
    networks:
      - buero-network

  minio:
    image: minio/minio
    restart: unless-stopped
    profiles: ["dev", "prod"]
    environment:
      MINIO_ROOT_USER: ${S3_ACCESS_KEY}
      MINIO_ROOT_PASSWORD: ${S3_SECRET_KEY}
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 5s
      timeout: 5s
      retries: 5
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9001"
    networks:
      - buero-network

  mailpit:
    image: axllent/mailpit
    restart: unless-stopped
    profiles: ["dev"]
    ports:
      - "8025:8025"
      - "1025:1025"
    networks:
      - buero-network

  # --- APP ---
  app-dev:
    build:
      context: .
      dockerfile: Dockerfile
      target: development
    profiles: ["dev"]
    depends_on:
      db: { condition: service_healthy }
      redis: { condition: service_healthy }
      minio: { condition: service_healthy }
    volumes:
      - .:/app
      - /app/node_modules
    environment:
      - NODE_ENV=development
      - DATABASE_URL=${DATABASE_URL}
      - REDIS_URL=${REDIS_URL}
      - REDIS_PASSWD=${REDIS_PASSWD}
      - BETTER_AUTH_SECRET=${BETTER_AUTH_SECRET}
      - BETTER_AUTH_BASE_URL=${BETTER_AUTH_BASE_URL}
      - S3_ENDPOINT=${S3_ENDPOINT}
      - S3_REGION=${S3_REGION}
      - S3_ACCESS_KEY=${S3_ACCESS_KEY}
      - S3_SECRET_KEY=${S3_SECRET_KEY}
      - S3_BUCKET_NAME=${S3_BUCKET_NAME}
      - S3_CDN_URL=${S3_CDN_URL}
      - RESEND_API_KEY=${RESEND_API_KEY}
      - ORIGIN=${ORIGIN}
      - BODY_SIZE_LIMIT=10M
    logging:
      driver: "json-file"
    networks:
      - buero-network

  varnish:
    image: varnish:7.4-alpine
    restart: unless-stopped
    profiles: ["dev", "prod"]
    volumes:
      - ./config/varnish/default.vcl:/etc/varnish/default.vcl
    tmpfs:
      - /var/lib/varnish:exec
    depends_on:
      minio: { condition: service_healthy }
    networks:
      - buero-network

  caddy:
    image: caddy:2.7-alpine
    restart: unless-stopped
    profiles: ["dev", "prod"]
    ports:
      - "80:80"
      - "443:443"
      - "8080:8080"
      - "9000:9000"
    volumes:
      - ./config/Caddyfile:/etc/caddy/Caddyfile
      - caddy_data:/data
      - caddy_config:/config
    healthcheck:
      test:
        [
          "CMD",
          "wget",
          "--no-verbose",
          "--tries=1",
          "--spider",
          "http://localhost:2019/config/",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
    logging:
      driver: "json-file"
    depends_on:
      minio: { condition: service_healthy }
      varnish: { condition: service_started }
    networks:
      - buero-network

  # --- OBSERVABILITY (Loki 3.0, Grafana 10.x) ---
  prometheus:
    image: prom/prometheus:latest
    restart: unless-stopped
    profiles: ["dev", "prod"]
    ports:
      - "9090:9090"
    volumes:
      - ./config/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    networks:
      - buero-network

  loki:
    image: grafana/loki:latest
    restart: unless-stopped
    profiles: ["dev", "prod"]
    ports:
      - "3100:3100"
    volumes:
      - ./config/loki.yaml:/etc/loki/local-config.yaml
      - loki_data:/tmp/loki
    command: -config.file=/etc/loki/local-config.yaml
    networks:
      - buero-network

  promtail:
    image: grafana/promtail:latest
    restart: unless-stopped
    profiles: ["dev", "prod"]
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
      - ./config/promtail.yml:/etc/promtail/config.yml
    command: -config.file=/etc/promtail/config.yml
    networks:
      - buero-network

  grafana:
    image: grafana/grafana:latest
    restart: unless-stopped
    profiles: ["dev", "prod"]
    ports:
      - "3001:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
    volumes:
      - grafana_data:/var/lib/grafana
    depends_on:
      - loki
      - prometheus
    networks:
      - buero-network

networks:
  buero-network:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
  minio_data:
  caddy_data:
  caddy_config:
  prometheus_data:
  loki_data:
  grafana_data:
